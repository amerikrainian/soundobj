name: Build wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x86_64
            runs-on: ubuntu-latest
            archs: x86_64
          - os: linux-aarch64
            runs-on: ubuntu-24.04-arm
            archs: aarch64
          - os: macos-x86_64
            runs-on: macos-13
            archs: x86_64
          - os: macos-arm64
            runs-on: macos-latest
            archs: arm64
          - os: windows-x86_64
            runs-on: windows-latest
            archs: AMD64
    steps:
      - uses: actions/checkout@v4

      - name: Activate MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Build wheels
        uses: pypa/cibuildwheel@v3
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_PRERELEASE_PYTHONS: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

